<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人資產戰情室 - 核心版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-primary: #0f1419;
            --bg-secondary: #192734;
            --bg-card: #22303c;
            --accent-green: #00d4aa;
            --accent-blue: #1d9bf0;
            --accent-red: #f4212e;
            --accent-yellow: #ffd400;
            --text-primary: #ffffff;
            --text-secondary: #8899a6;
            --border-color: #38444d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at top, #1a2f4a 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, #0d2818 0%, transparent 40%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0;
        }

        header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        /* 戰情室儀表板佈局 */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .summary-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .chart-container {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 250px;
        }

        .summary-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border-color);
            transition: transform 0.2s;
        }

        .summary-card h3 {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-bottom: 8px;
        }

        .summary-card .value {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .card-bank {
            border-left: 4px solid var(--accent-blue);
        }

        .card-stock {
            border-left: 4px solid var(--accent-green);
        }

        .card-total {
            border-left: 4px solid var(--accent-yellow);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: var(--bg-secondary);
            padding: 6px;
            border-radius: 12px;
            width: fit-content;
        }

        .tab {
            padding: 10px 20px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 8px;
            transition: 0.2s;
        }

        .tab.active {
            background: var(--accent-green);
            color: var(--bg-primary);
            font-weight: bold;
        }

        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }

        .btn-primary {
            background: var(--accent-green);
            color: var(--bg-primary);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-danger {
            color: var(--accent-red);
            background: transparent;
        }

        .btn-danger:hover {
            background: rgba(244, 33, 46, 0.1);
        }

        .btn-fetch {
            background: var(--accent-blue);
            color: white;
        }

        .asset-list {
            display: grid;
            gap: 10px;
        }

        .asset-item {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 15px 20px;
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .asset-info h4 {
            font-size: 1.1rem;
        }

        .asset-info p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .asset-amount {
            text-align: right;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* Modal 樣式 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-secondary);
            padding: 30px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            border: 1px solid var(--border-color);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            color: var(--text-secondary);
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: white;
        }

        .price-status {
            font-size: 0.8rem;
            margin-top: 5px;
            display: none;
        }

        .price-status.error {
            color: var(--accent-red);
        }

        .last-updated {
            text-align: center;
            color: var(--text-secondary);
            margin-top: 30px;
            font-size: 0.8rem;
        }

        @media (max-width: 850px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>個人資產戰情室</h1>
            <p>掌控你的財富流向</p>
        </header>

        <div class="dashboard-grid">
            <div class="summary-stats">
                <div class="summary-card card-total">
                    <h3>總資產淨值</h3>
                    <div class="value" id="totalAsset">$0</div>
                </div>
                <div class="summary-card card-bank">
                    <h3>銀行存款</h3>
                    <div class="value" id="totalBank">$0</div>
                </div>
                <div class="summary-card card-stock">
                    <h3>股票現值</h3>
                    <div class="value" id="totalStock">$0</div>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="assetChart"></canvas>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" data-tab="bank">銀行帳戶</button>
            <button class="tab" data-tab="stock">股票投資</button>
        </div>

        <div class="panel active" id="bank-panel">
            <div class="panel-header">
                <h2>銀行帳戶清單</h2>
                <button class="btn btn-primary" onclick="openModal('bank')">+ 新增帳戶</button>
            </div>
            <div id="bank-list" class="asset-list"></div>
        </div>

        <div class="panel" id="stock-panel">
            <div class="panel-header">
                <h2>股票持股明細</h2>
                <div style="display: flex; gap: 8px;">
                    <button class="btn btn-secondary" onclick="refreshAllPrices()">🔄 全部更新</button>
                    <button class="btn btn-primary" onclick="openModal('stock')">+ 新增股票</button>
                </div>
            </div>
            <div id="stock-list" class="asset-list"></div>
        </div>

        <div class="last-updated" id="last-updated"></div>
    </div>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h2 id="modal-title" style="margin-bottom: 20px;">新增資料</h2>
            <form id="asset-form">
                <div class="form-group">
                    <label id="label-name">名稱/代碼</label>
                    <input type="text" id="input-name" required placeholder="例如：2330 或 台積電" list="stock-list-options">
                    <datalist id="stock-list-options"></datalist>
                </div>

                <div id="stock-fields" style="display: none;">
                    <div class="form-group">
                        <label>市場</label>
                        <select id="input-market"
                            style="width: 100%; padding: 12px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; color: white; margin-bottom: 5px;">
                            <option value="TW">台股 (TWD)</option>
                            <option value="US">美股 (自動換算為台幣)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>持股數量 (股)</label>
                        <input type="number" id="input-quantity" step="any" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label>當前股價 (台幣/元)</label>
                        <div style="display: flex; gap: 5px;">
                            <input type="number" id="input-price" step="0.01" placeholder="0.00">
                            <button type="button" class="btn btn-fetch" onclick="fetchPriceAction()">抓取</button>
                        </div>
                        <div id="price-status" class="price-status"></div>
                    </div>
                </div>

                <div id="bank-fields">
                    <div class="form-group">
                        <label>存款餘額</label>
                        <input type="number" id="input-amount" step="1" placeholder="0">
                    </div>
                </div>

                <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn btn-primary">儲存資料</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- 配置區 ---
        const STORAGE_KEY = 'WAR_ROOM_DATA';
        // 若你有部署 GAS 代理，請填入網址，否則將使用 Yahoo + Proxy
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxzKH65rFnNXK77MxWuedtvPr---AAR7DxwyxRPkXrqcORLScbLo6BKUAyeTqYVxrk7/exec';
        const PROXY = 'https://api.allorigins.win/raw?url=';

        let db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { bank: [], stock: [] };
        let currentTab = 'bank';
        let editingId = null;
        let myChart = null;
        let twStockMap = new Map();
        let twNameMap = new Map();

        async function initTwStocks() {
            try {
                const res = await fetch("https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockInfo");
                const json = await res.json();
                if (json.data) {
                    const datalist = document.getElementById('stock-list-options');
                    let optionsHtml = '';
                    const addedIds = new Set();

                    json.data.forEach(item => {
                        if (item.stock_id && item.stock_name) {
                            twStockMap.set(item.stock_id, item.stock_name);
                            twNameMap.set(item.stock_name, item.stock_id);

                            if (!addedIds.has(item.stock_id)) {
                                addedIds.add(item.stock_id);
                                optionsHtml += `<option value="${item.stock_name} (${item.stock_id})"></option>`;
                            }
                        }
                    });
                    datalist.innerHTML = optionsHtml;

                    let changed = false;
                    db.stock.forEach(s => {
                        let market = s.market || 'TW';
                        if (market === 'TW' && !s.symbol && /^\\d+$/.test(s.name) && twStockMap.has(s.name)) {
                            s.symbol = s.name;
                            s.name = twStockMap.get(s.name);
                            changed = true;
                        }
                    });
                    if (changed) saveData();
                    else renderAll();
                }
            } catch (e) {
                console.log("TW stocks load failed", e);
            }
        }
        initTwStocks();

        // --- 核心邏輯 ---

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
            localStorage.setItem('WAR_ROOM_LAST_UPDATE', new Date().toISOString());
            renderAll();
        }

        // 格式化貨幣
        const fmt = (v) => '$' + Math.round(v).toLocaleString();

        // 抓取匯率
        async function getExchangeRate() {
            if (GAS_URL) {
                try {
                    const res = await fetch(`${GAS_URL}?ticker=TWD%3DX`);
                    const json = await res.json();
                    if (json.price && json.price !== "#N/A") return json.price;
                } catch (e) {
                    console.log('GAS Error for exchange rate', e);
                }
            }

            const target = `https://query1.finance.yahoo.com/v8/finance/chart/TWD=X?interval=1d&range=1d`;
            try {
                const res = await fetch(PROXY + encodeURIComponent(target));
                const data = await res.json();
                const rate = data.chart?.result?.[0]?.meta?.regularMarketPrice;
                if (rate) return rate;
            } catch (e) {
                console.log('Proxy Error for exchange rate', e);
            }
            throw new Error('匯率抓取失敗');
        }

        // 抓取股價邏輯
        async function getStockPrice(code, market = 'TW') {
            code = code.trim().toUpperCase();

            // 如果有 GAS，優先使用
            try {
                if (GAS_URL) {
                    let ticker = code;
                    if (market === 'TW' && /^\d+$/.test(code)) ticker = `TPE:${code}`;

                    const res = await fetch(`${GAS_URL}?ticker=${ticker}`);
                    const json = await res.json();
                    if (json.price && json.price !== "#N/A") return json.price;
                    if (json.error) throw new Error(json.error);
                }
            } catch (e) {
                console.log('GAS Error, fallback to Yahoo', e);
            }

            // 否則使用 Yahoo Finance + Proxy
            const symbol = market === 'TW' ? (/^\d+$/.test(code) ? `${code}.TW` : code) : code;
            const target = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1m&range=1d`;

            const res = await fetch(PROXY + encodeURIComponent(target));
            const data = await res.json();
            const price = data.chart?.result?.[0]?.meta?.regularMarketPrice;
            if (price) return price;
            throw new Error('抓取失敗');
        }

        async function fetchPriceAction() {
            let inputVal = document.getElementById('input-name').value.trim();
            const market = document.getElementById('input-market').value;
            const status = document.getElementById('price-status');
            const btn = document.querySelector('.btn-fetch');

            if (!inputVal) return alert('請先輸入代碼或名稱');

            let code = inputVal;
            if (market === 'TW') {
                const match = inputVal.match(/\((\d+)\)/);
                if (match) {
                    code = match[1];
                } else if (twNameMap.has(inputVal)) {
                    code = twNameMap.get(inputVal);
                } else if (twStockMap.has(inputVal)) {
                    code = inputVal;
                }
            }

            btn.disabled = true;
            status.style.display = 'block';
            status.className = 'price-status';
            status.textContent = '搜尋中...';

            try {
                let p = await getStockPrice(code, market);
                let msg = `成功！最新報價: ${p}`;
                if (market === 'US') {
                    status.textContent = '取得美元對台幣匯率中...';
                    const rate = await getExchangeRate();
                    p = p * rate;
                    msg = `報價(USD): ${(p / rate).toFixed(2)}，匯率: ${rate.toFixed(2)}，換算台幣: ${Math.round(p)}`;
                }
                document.getElementById('input-price').value = p.toFixed(2);
                status.textContent = msg;
            } catch (e) {
                status.textContent = '抓取失敗，請手動輸入';
                status.className = 'price-status error';
            } finally {
                btn.disabled = false;
            }
        }

        async function refreshAllPrices() {
            const btn = document.querySelector('.btn-secondary');
            const originalText = btn.textContent;
            btn.textContent = '更新中...';
            btn.disabled = true;

            let usRate = null;

            for (let item of db.stock) {
                try {
                    let codeToFetch = item.symbol || item.name;
                    let newPrice = await getStockPrice(codeToFetch, item.market || 'TW');
                    if (item.market === 'US') {
                        if (!usRate) usRate = await getExchangeRate();
                        newPrice = newPrice * usRate;
                    }
                    item.price = newPrice;
                } catch (e) { console.log(item.name + ' 更新失敗'); }
            }
            saveData();
            btn.textContent = originalText;
            btn.disabled = false;
            alert('全部股價更新完成');
        }

        // --- 介面渲染 ---

        function renderAll() {
            renderList('bank');
            renderList('stock');
            updateDashboard();
            updateChart();
        }

        function updateDashboard() {
            const bankSum = db.bank.reduce((a, b) => a + Number(b.amount), 0);
            const stockSum = db.stock.reduce((a, b) => a + (Number(b.quantity) * Number(b.price)), 0);

            document.getElementById('totalBank').textContent = fmt(bankSum);
            document.getElementById('totalStock').textContent = fmt(stockSum);
            document.getElementById('totalAsset').textContent = fmt(bankSum + stockSum);

            const last = localStorage.getItem('WAR_ROOM_LAST_UPDATE');
            document.getElementById('last-updated').textContent = last ? `最後同步時間：${new Date(last).toLocaleString()}` : '';
        }

        function renderList(type) {
            const listEl = document.getElementById(`${type}-list`);
            listEl.innerHTML = '';

            db[type].forEach(item => {
                const div = document.createElement('div');
                div.className = 'asset-item';

                const val = type === 'bank' ? item.amount : (item.quantity * item.price);
                const marketLabel = item.market === 'US' ? '<span style="font-size: 0.7rem; background: var(--accent-blue); padding: 2px 6px; border-radius: 4px; color: white;">美股</span> ' : '';
                const sub = type === 'bank' ? '存款帳戶' : `${marketLabel}${item.quantity} 股 @ $${Number(item.price).toFixed(2)}`;
                const displayName = (type === 'stock' && item.market !== 'US' && item.symbol) ? `${item.name} (${item.symbol})` : item.name;

                div.innerHTML = `
                <div class="asset-info">
                    <h4>${displayName}</h4>
                    <p>${sub}</p>
                </div>
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div class="asset-amount">${fmt(val)}</div>
                    <div style="display: flex; gap: 5px;">
                        <button class="btn btn-danger" style="color:var(--accent-blue)" onclick="editItem('${type}', '${item.id}')">編輯</button>
                        <button class="btn btn-danger" onclick="deleteItem('${type}', '${item.id}')">刪除</button>
                    </div>
                </div>
            `;
                listEl.appendChild(div);
            });
        }

        function updateChart() {
            const bankSum = db.bank.reduce((a, b) => a + Number(b.amount), 0);
            const stockSum = db.stock.reduce((a, b) => a + (Number(b.quantity) * Number(b.price)), 0);

            if (myChart) myChart.destroy();

            const ctx = document.getElementById('assetChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['銀行存款', '股票投資'],
                    datasets: [{
                        data: [bankSum, stockSum],
                        backgroundColor: ['#1d9bf0', '#00d4aa'],
                        borderColor: '#192734',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { color: '#8899a6' } }
                    }
                }
            });
        }

        // --- Modal 與 操作 ---

        function openModal(type, id = null) {
            currentTab = type;
            editingId = id;
            const modal = document.getElementById('modal-overlay');
            const form = document.getElementById('asset-form');
            form.reset();
            document.getElementById('price-status').style.display = 'none';

            if (type === 'stock') {
                document.getElementById('modal-title').textContent = id ? '編輯股票' : '新增股票持股';
                document.getElementById('label-name').textContent = '股票代碼 (例如: 2330, AAPL)';
                document.getElementById('input-name').placeholder = '例如：2330 或 台積電';
                document.getElementById('stock-fields').style.display = 'block';
                document.getElementById('bank-fields').style.display = 'none';
                document.getElementById('input-market').value = 'TW';
            } else {
                document.getElementById('modal-title').textContent = id ? '編輯帳戶' : '新增銀行帳戶';
                document.getElementById('label-name').textContent = '銀行/帳戶名稱';
                document.getElementById('input-name').placeholder = '例如：國泰、台新';
                document.getElementById('stock-fields').style.display = 'none';
                document.getElementById('bank-fields').style.display = 'block';
            }

            if (id) {
                const item = db[type].find(i => i.id === id);
                if (type === 'bank') {
                    document.getElementById('input-name').value = item.name;
                    document.getElementById('input-amount').value = item.amount;
                } else {
                    if (item.market) document.getElementById('input-market').value = item.market;
                    if (item.market !== 'US' && item.symbol) {
                        document.getElementById('input-name').value = `${item.name} (${item.symbol})`;
                    } else {
                        document.getElementById('input-name').value = item.name;
                    }
                    document.getElementById('input-quantity').value = item.quantity;
                    document.getElementById('input-price').value = item.price;
                }
            }
            modal.classList.add('active');
        }

        function closeModal() { document.getElementById('modal-overlay').classList.remove('active'); }

        function deleteItem(type, id) {
            if (!confirm('確定要刪除這筆資料嗎？')) return;
            db[type] = db[type].filter(i => i.id !== id);
            saveData();
        }

        function editItem(type, id) { openModal(type, id); }

        document.getElementById('asset-form').onsubmit = function (e) {
            e.preventDefault();
            const name = document.getElementById('input-name').value.trim();

            let itemData = { id: editingId || Date.now().toString(), name: name };

            if (currentTab === 'bank') {
                itemData.amount = Number(document.getElementById('input-amount').value) || 0;
            } else {
                itemData.market = document.getElementById('input-market').value;
                itemData.quantity = Number(document.getElementById('input-quantity').value) || 0;
                itemData.price = Number(document.getElementById('input-price').value) || 0;

                if (itemData.market === 'TW') {
                    const match = itemData.name.match(/(.+?)\s*\((\d+)\)/);
                    if (match) {
                        itemData.name = match[1].trim();
                        itemData.symbol = match[2];
                    } else if (twNameMap.has(itemData.name)) {
                        itemData.symbol = twNameMap.get(itemData.name);
                    } else if (twStockMap.has(itemData.name)) {
                        itemData.symbol = itemData.name;
                        itemData.name = twStockMap.get(itemData.name);
                    } else {
                        itemData.symbol = itemData.name;
                    }
                } else {
                    itemData.symbol = itemData.name;
                }
            }

            if (editingId) {
                const idx = db[currentTab].findIndex(i => i.id === editingId);
                db[currentTab][idx] = itemData;
            } else {
                db[currentTab].push(itemData);
            }

            saveData();
            closeModal();
        };

        // Tab 切換
        document.querySelectorAll('.tab').forEach(btn => {
            btn.onclick = function () {
                document.querySelectorAll('.tab, .panel').forEach(el => el.classList.remove('active'));
                this.classList.add('active');
                document.getElementById(`${this.dataset.tab}-panel`).classList.add('active');
                currentTab = this.dataset.tab;
            };
        });

        // 初始化渲染
        renderAll();
    </script>

</body>

</html>
