<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人資產戰情室 - 核心版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-primary: #0f1419;
            --bg-secondary: #192734;
            --bg-card: #22303c;
            --accent-green: #00d4aa;
            --accent-blue: #1d9bf0;
            --accent-red: #f4212e;
            --accent-yellow: #ffd400;
            --text-primary: #ffffff;
            --text-secondary: #8899a6;
            --border-color: #38444d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at top, #1a2f4a 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, #0d2818 0%, transparent 40%);
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        header { text-align: center; padding: 40px 0; }
        header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        /* 戰情室儀表板佈局 */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .summary-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .chart-container {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 250px;
        }

        .summary-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border-color);
            transition: transform 0.2s;
        }

        .summary-card h3 { color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 8px; }
        .summary-card .value { font-size: 1.8rem; font-weight: 700; }
        .card-bank { border-left: 4px solid var(--accent-blue); }
        .card-stock { border-left: 4px solid var(--accent-green); }
        .card-total { border-left: 4px solid var(--accent-yellow); }

        .tabs {
            display: flex; gap: 10px; margin-bottom: 20px;
            background: var(--bg-secondary); padding: 6px; border-radius: 12px; width: fit-content;
        }

        .tab {
            padding: 10px 20px; border: none; background: transparent;
            color: var(--text-secondary); cursor: pointer; border-radius: 8px; transition: 0.2s;
        }

        .tab.active { background: var(--accent-green); color: var(--bg-primary); font-weight: bold; }

        .panel { display: none; }
        .panel.active { display: block; }

        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }

        .btn {
            padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer;
            font-weight: 500; display: inline-flex; align-items: center; gap: 6px; transition: 0.2s;
        }
        .btn-primary { background: var(--accent-green); color: var(--bg-primary); }
        .btn-secondary { background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border-color); }
        .btn-danger { color: var(--accent-red); background: transparent; }
        .btn-danger:hover { background: rgba(244, 33, 46, 0.1); }
        .btn-fetch { background: var(--accent-blue); color: white; }

        .asset-list { display: grid; gap: 10px; }
        .asset-item {
            background: var(--bg-card); border-radius: 12px; padding: 15px 20px;
            border: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;
        }

        .asset-info h4 { font-size: 1.1rem; }
        .asset-info p { color: var(--text-secondary); font-size: 0.85rem; }
        .asset-amount { text-align: right; font-weight: bold; font-size: 1.1rem; }

        /* Modal 樣式 */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--bg-secondary); padding: 30px; border-radius: 16px;
            width: 90%; max-width: 400px; border: 1px solid var(--border-color);
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; color: var(--text-secondary); margin-bottom: 5px; font-size: 0.9rem; }
        .form-group input {
            width: 100%; padding: 12px; background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 8px; color: white;
        }
        .price-status { font-size: 0.8rem; margin-top: 5px; display: none; }
        .price-status.error { color: var(--accent-red); }

        .last-updated { text-align: center; color: var(--text-secondary); margin-top: 30px; font-size: 0.8rem; }

        @media (max-width: 850px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>個人資產戰情室</h1>
        <p>掌控你的財富流向</p>
    </header>

    <div class="dashboard-grid">
        <div class="summary-stats">
            <div class="summary-card card-total">
                <h3>總資產淨值</h3>
                <div class="value" id="totalAsset">$0</div>
            </div>
            <div class="summary-card card-bank">
                <h3>銀行存款</h3>
                <div class="value" id="totalBank">$0</div>
            </div>
            <div class="summary-card card-stock">
                <h3>股票現值</h3>
                <div class="value" id="totalStock">$0</div>
            </div>
        </div>
        <div class="chart-container">
            <canvas id="assetChart"></canvas>
        </div>
    </div>

    <div class="tabs">
        <button class="tab active" data-tab="bank">銀行帳戶</button>
        <button class="tab" data-tab="stock">股票投資</button>
    </div>

    <div class="panel active" id="bank-panel">
        <div class="panel-header">
            <h2>銀行帳戶清單</h2>
            <button class="btn btn-primary" onclick="openModal('bank')">+ 新增帳戶</button>
        </div>
        <div id="bank-list" class="asset-list"></div>
    </div>

    <div class="panel" id="stock-panel">
        <div class="panel-header">
            <h2>股票持股明細</h2>
            <div style="display: flex; gap: 8px;">
                <button class="btn btn-secondary" onclick="refreshAllPrices()">🔄 全部更新</button>
                <button class="btn btn-primary" onclick="openModal('stock')">+ 新增股票</button>
            </div>
        </div>
        <div id="stock-list" class="asset-list"></div>
    </div>

    <div class="last-updated" id="last-updated"></div>
</div>

<div class="modal-overlay" id="modal-overlay">
    <div class="modal">
        <h2 id="modal-title" style="margin-bottom: 20px;">新增資料</h2>
        <form id="asset-form">
            <div class="form-group">
                <label id="label-name">名稱/代碼</label>
                <input type="text" id="input-name" required placeholder="例如：2330 或 中信銀">
            </div>
            
            <div id="stock-fields" style="display: none;">
                <div class="form-group">
                    <label>持股數量 (股)</label>
                    <input type="number" id="input-quantity" step="1" placeholder="0">
                </div>
                <div class="form-group">
                    <label>當前金價/股價 (元)</label>
                    <div style="display: flex; gap: 5px;">
                        <input type="number" id="input-price" step="0.01" placeholder="0.00">
                        <button type="button" class="btn btn-fetch" onclick="fetchPriceAction()">抓取</button>
                    </div>
                    <div id="price-status" class="price-status"></div>
                </div>
            </div>

            <div id="bank-fields">
                <div class="form-group">
                    <label>存款餘額</label>
                    <input type="number" id="input-amount" step="1" placeholder="0">
                </div>
            </div>

            <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;">
                <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button type="submit" class="btn btn-primary">儲存資料</button>
            </div>
        </form>
    </div>
</div>

<script>
    // --- 配置區 ---
    const STORAGE_KEY = 'WAR_ROOM_DATA';
    // 若你有部署 GAS 代理，請填入網址，否則將使用 Yahoo + Proxy
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxzKH65rFnNXK77MxWuedtvPr---AAR7DxwyxRPkXrqcORLScbLo6BKUAyeTqYVxrk7/exec'; 
    const PROXY = 'https://api.allorigins.win/raw?url=';

    let db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { bank: [], stock: [] };
    let currentTab = 'bank';
    let editingId = null;
    let myChart = null;

    // --- 核心邏輯 ---

    function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
        localStorage.setItem('WAR_ROOM_LAST_UPDATE', new Date().toISOString());
        renderAll();
    }

    // 格式化貨幣
    const fmt = (v) => '$' + Math.round(v).toLocaleString();

    // 抓取股價邏輯
    async function getStockPrice(code) {
        code = code.trim().toUpperCase();
        
        // 如果有 GAS，優先使用
        if (GAS_URL) {
            const ticker = /^\d{4,5}$/.test(code) ? `TPE:${code}` : code;
            const res = await fetch(`${GAS_URL}?ticker=${ticker}`);
            const json = await res.json();
            if (json.price && json.price !== "#N/A") return json.price;
            throw new Error('GAS 無法取得價格');
        }

        // 否則使用 Yahoo Finance + Proxy
        const symbol = /^\d{4,5}$/.test(code) ? `${code}.TW` : code;
        const target = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1m&range=1d`;
        
        const res = await fetch(PROXY + encodeURIComponent(target));
        const data = await res.json();
        const price = data.chart.result[0].meta.regularMarketPrice;
        if (price) return price;
        throw new Error('抓取失敗');
    }

    async function fetchPriceAction() {
        const code = document.getElementById('input-name').value;
        const status = document.getElementById('price-status');
        const btn = document.querySelector('.btn-fetch');
        
        if(!code) return alert('請先輸入代碼');
        
        btn.disabled = true;
        status.style.display = 'block';
        status.className = 'price-status';
        status.textContent = '搜尋中...';

        try {
            const p = await getStockPrice(code);
            document.getElementById('input-price').value = p;
            status.textContent = `成功！最新報價: ${p}`;
        } catch (e) {
            status.textContent = '抓取失敗，請手動輸入';
            status.className = 'price-status error';
        } finally {
            btn.disabled = false;
        }
    }

    async function refreshAllPrices() {
        const btn = document.querySelector('.btn-secondary');
        const originalText = btn.textContent;
        btn.textContent = '更新中...';
        btn.disabled = true;

        for (let item of db.stock) {
            try {
                const newPrice = await getStockPrice(item.name);
                item.price = newPrice;
            } catch (e) { console.log(item.name + ' 更新失敗'); }
        }
        saveData();
        btn.textContent = originalText;
        btn.disabled = false;
        alert('全部股價更新完成');
    }

    // --- 介面渲染 ---

    function renderAll() {
        renderList('bank');
        renderList('stock');
        updateDashboard();
        updateChart();
    }

    function updateDashboard() {
        const bankSum = db.bank.reduce((a, b) => a + Number(b.amount), 0);
        const stockSum = db.stock.reduce((a, b) => a + (Number(b.quantity) * Number(b.price)), 0);
        
        document.getElementById('totalBank').textContent = fmt(bankSum);
        document.getElementById('totalStock').textContent = fmt(stockSum);
        document.getElementById('totalAsset').textContent = fmt(bankSum + stockSum);

        const last = localStorage.getItem('WAR_ROOM_LAST_UPDATE');
        document.getElementById('last-updated').textContent = last ? `最後同步時間：${new Date(last).toLocaleString()}` : '';
    }

    function renderList(type) {
        const listEl = document.getElementById(`${type}-list`);
        listEl.innerHTML = '';
        
        db[type].forEach(item => {
            const div = document.createElement('div');
            div.className = 'asset-item';
            
            const val = type === 'bank' ? item.amount : (item.quantity * item.price);
            const sub = type === 'bank' ? '存款帳戶' : `${item.quantity} 股 @ ${item.price}`;

            div.innerHTML = `
                <div class="asset-info">
                    <h4>${item.name}</h4>
                    <p>${sub}</p>
                </div>
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div class="asset-amount">${fmt(val)}</div>
                    <div style="display: flex; gap: 5px;">
                        <button class="btn btn-danger" style="color:var(--accent-blue)" onclick="editItem('${type}', '${item.id}')">編輯</button>
                        <button class="btn btn-danger" onclick="deleteItem('${type}', '${item.id}')">刪除</button>
                    </div>
                </div>
            `;
            listEl.appendChild(div);
        });
    }

    function updateChart() {
        const bankSum = db.bank.reduce((a, b) => a + Number(b.amount), 0);
        const stockSum = db.stock.reduce((a, b) => a + (Number(b.quantity) * Number(b.price)), 0);
        
        if (myChart) myChart.destroy();
        
        const ctx = document.getElementById('assetChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['銀行存款', '股票投資'],
                datasets: [{
                    data: [bankSum, stockSum],
                    backgroundColor: ['#1d9bf0', '#00d4aa'],
                    borderColor: '#192734',
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'bottom', labels: { color: '#8899a6' } }
                }
            }
        });
    }

    // --- Modal 與 操作 ---

    function openModal(type, id = null) {
        currentTab = type;
        editingId = id;
        const modal = document.getElementById('modal-overlay');
        const form = document.getElementById('asset-form');
        form.reset();
        document.getElementById('price-status').style.display = 'none';

        if(type === 'stock') {
            document.getElementById('modal-title').textContent = id ? '編輯股票' : '新增股票持股';
            document.getElementById('label-name').textContent = '股票代碼 (例如: 2330, AAPL)';
            document.getElementById('stock-fields').style.display = 'block';
            document.getElementById('bank-fields').style.display = 'none';
        } else {
            document.getElementById('modal-title').textContent = id ? '編輯帳戶' : '新增銀行帳戶';
            document.getElementById('label-name').textContent = '銀行/帳戶名稱';
            document.getElementById('stock-fields').style.display = 'none';
            document.getElementById('bank-fields').style.display = 'block';
        }

        if(id) {
            const item = db[type].find(i => i.id === id);
            document.getElementById('input-name').value = item.name;
            if(type === 'bank') document.getElementById('input-amount').value = item.amount;
            else {
                document.getElementById('input-quantity').value = item.quantity;
                document.getElementById('input-price').value = item.price;
            }
        }
        modal.classList.add('active');
    }

    function closeModal() { document.getElementById('modal-overlay').classList.remove('active'); }

    function deleteItem(type, id) {
        if(!confirm('確定要刪除這筆資料嗎？')) return;
        db[type] = db[type].filter(i => i.id !== id);
        saveData();
    }

    function editItem(type, id) { openModal(type, id); }

    document.getElementById('asset-form').onsubmit = function(e) {
        e.preventDefault();
        const name = document.getElementById('input-name').value.trim();
        
        let itemData = { id: editingId || Date.now().toString(), name: name };

        if(currentTab === 'bank') {
            itemData.amount = Number(document.getElementById('input-amount').value) || 0;
        } else {
            itemData.quantity = Number(document.getElementById('input-quantity').value) || 0;
            itemData.price = Number(document.getElementById('input-price').value) || 0;
        }

        if(editingId) {
            const idx = db[currentTab].findIndex(i => i.id === editingId);
            db[currentTab][idx] = itemData;
        } else {
            db[currentTab].push(itemData);
        }

        saveData();
        closeModal();
    };

    // Tab 切換
    document.querySelectorAll('.tab').forEach(btn => {
        btn.onclick = function() {
            document.querySelectorAll('.tab, .panel').forEach(el => el.classList.remove('active'));
            this.classList.add('active');
            document.getElementById(`${this.dataset.tab}-panel`).classList.add('active');
            currentTab = this.dataset.tab;
        };
    });

    // 初始化渲染
    renderAll();
</script>

</body>
</html>
